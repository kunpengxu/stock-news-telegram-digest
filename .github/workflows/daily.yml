name: Daily Newsfilter Telegram Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1,10 * * *"

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run parser test
        run: python -m unittest discover -s tests

      - name: Send digest
        env:
          NEWSFILTER_API_KEY: ${{ secrets.NEWSFILTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'gemini' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          ZHIPU_MODEL: ${{ vars.ZHIPU_MODEL || 'glm-4-flash' }}
          MAX_BULLETS_PER_SECTOR: ${{ vars.MAX_BULLETS_PER_SECTOR || '6' }}
          NEWSFILTER_LOOKBACK_HOURS: ${{ vars.NEWSFILTER_LOOKBACK_HOURS || '24' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          SEND_FALLBACK_ON_ERROR: ${{ vars.SEND_FALLBACK_ON_ERROR || 'false' }}
        run: python main.py
